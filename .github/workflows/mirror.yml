name: Mirror Repository

on:
  push:
    branches: [ "*" ]
    tags: [ "*" ]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    if: github.repository != 'EpitechPGE2-2025/G-YEP-400-BAR-4-1-zappy-1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Target
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@github.com:EpitechPGE2-2025/G-YEP-400-BAR-4-1-zappy-1.git
          ssh_private_key: ${{ secrets.GIT_SSH_PRIVATE_KEY }}
